openapi: 3.0.3  
info:
  title: Price API
  description: API for Price Aggregator Project
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local server
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        plan:
          type: string
          enum: [basic, growth, pro]
          example: basic
        newsletter:
          type: boolean
    Market:
      type: object
      properties:
        openTime:
          type: string
          format: date-time
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
    Payment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        amountUsdt:
          type: number
        amountCurrency:
          type: number
        currency:
          type: string
        transactionId:
          type: string
        status:
          type: string
          enum: [pending, confirmed, failed]
        createdAt:
          type: string
          format: date-time
    ApiKey:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        key:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
security:
  - BearerAuth: []

tags:
  - name: Auth
    description: User authentication and account management
  - name: Markets
    description: Market info and coin prices
  - name: Markets
    description: Market data for different intervals
  - name: Payments
    description: Payment, subscription, and plan management
  - name: API Keys
    description: API key management for users
  - name: Users
    description: User profile and account management


paths:
  /auth/signup:
    post:
      tags: [Auth]
      summary: Sign up a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password, plan, agreeToTerms]
              properties:
                email:
                  type: string
                  example: john@example.com
                name:
                  type: string
                  example: John Doe
                password:
                  type: string
                  example: strongPassword123
                plan:
                  type: string
                  enum: [basic, growth, pro]
                  example: basic
                newsletter:
                  type: boolean
                  example: true
                agreeToTerms:
                  type: boolean
                  example: true
      responses:
        201:
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User signed up successfully
                  user:
                    $ref: '#/components/schemas/User'

  /auth/login:
    post:
      tags: [Auth]
      summary: Sign in user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: strongPassword123
      responses:
        200:
          description: User signed in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: jwt.token.here

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: john@example.com
      responses:
        200:
          description: Password reset token sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password reset link sent
                  token:
                    type: string
                    example: 32-char-reset-token

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                  example: 32-char-reset-token
                newPassword:
                  type: string
                  example: NewStrongPassword123
      responses:
        200:
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password reset successful

  /api/v1/markets/{symbol}:
    get:
      tags: [Markets]
      summary: Get market info for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            example: BTC
        - name: cache-bust
          in: query
          required: false
          schema:
            type: string
      responses:
        200:
          description: Market info retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  symbol:
                    type: string
                    example: BTC
                  base:
                    type: string
                    example: BTC
                  quote:
                    type: string
                    example: USD
                  marketId:
                    type: integer
                    example: 6262
                  price:
                    type: number
                    example: 27354.12

  /api/v1/markets/{interval}/{marketId}:
    get:
      tags: [Markets]
      summary: Get Market data for marketId
      parameters:
        - name: interval
          in: path
          required: true
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w]
            example: 1m
        - name: marketId
          in: path
          required: true
          schema:
            type: integer
            example: 6262
        - name: from
          in: query
          required: false
          description: Unix timestamp (seconds)
          schema:
            type: integer
            example: 1773241043
        - name: to
          in: query
          required: false
          description: Unix timestamp (seconds)
          schema:
            type: integer
            example: 1773327443
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 100
      responses:
        200:
          description: Market data retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Market'

  /payments/verify:
    post:
      tags: [Payments]
      summary: Confirm user payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionId, amountCurrency, currency, plan,walletAddress,amountUsdt]
              properties:
                transactionId:
                  type: string
                  example: 0x123abc...
                amountCurrency:
                  type: number
                  example: 100 
                amountUsdt:
                  type: number
                  example: 100
                currency:
                  type: string
                  example: USDT
                plan:
                  type: string
                  enum: [basic, growth, pro]
                walletAddress:
                  type: string

      responses:
        200:
          description: Payment confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Payment confirmed and plan updated
                  payment:
                    $ref: '#/components/schemas/Payment'
  /payments/upgrade:
    post:
      tags: [Payments]
      summary: upgrade user plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionId, amountCurrency, currency, plan,walletAddress,amountUsdt]
              properties:
                transactionId:
                  type: string
                  example: 0x123abc...
                amountCurrency:
                  type: number
                  example: 100 
                amountUsdt:
                  type: number
                  example: 100
                currency:
                  type: string
                  example: USDT
                plan:
                  type: string
                  enum: [basic, growth, pro]
                walletAddress:
                  type: string

      responses:
        200:
          description: Payment confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Payment confirmed and plan updated
                  payment:
                    $ref: '#/components/schemas/Payment'

  /payments/history:
    get:
      tags: [Payments]
      summary: Get user billing history
      responses:
        200:
          description: Billing history retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
  
  /payments/current:
    get:
      tags: [Payments]
      summary: Get user current plan
      responses:
        200:
          description: Billing history retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
  

  /apikeys:
    post:
      tags: [API Keys]
      summary: Generate new API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: MyKey1
      responses:
        201:
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
    get:
      tags: [API Keys]
      summary: Get all API keys for current user
      responses:
        200:
          description: API keys retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKey'

  /apikeys/{id}:
    delete:
      tags: [API Keys]
      summary: Delete an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: API key deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: API key deleted successfully

  # ----------------- User Profile APIs -----------------
  /users/{id}:
    patch:
      tags: [Users]
      summary: Update user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  example: john@example.com
                companyName:
                  type: string
                  example: ACME Corp
                oldPassword:
                  type: string
                  example: oldPassword123
                newPassword:
                  type: string
                  example: NewPassword123
      responses:
        200:
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    delete:
      tags: [Users]
      summary: Delete user account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User deleted successfully
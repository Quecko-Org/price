openapi: 3.0.3  
info:
  title: Price API
  description: API for Price Aggregator Project
  version: 1.0.0
servers:
  - url: http://32.195.141.17:3000
    description: Local server
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        plan:
          type: string
          enum: [basic, growth, pro]
          example: basic
        newsletter:
          type: boolean
    Market:
      type: object
      properties:
        openTime:
          type: string
          format: date-time
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
    MarketPrice:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: number
    MarketStats:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: object
          properties:
            open:
              type: number
            close:
              type: number
            high:
              type: number
            low:
              type: number
            volume:
              type: number
    Payment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        amountUsdt:
          type: number
        amountCurrency:
          type: number
        currency:
          type: string
        transactionId:
          type: string
        status:
          type: string
          enum: [pending, confirmed, failed]
        createdAt:
          type: string
          format: date-time
    ApiKey:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        key:
          type: string
        createdAt:
          type: string
          format: date-time
        monthlyCalls:
          type: number
        lastCallAt:
          type: string
          format: date-time  
    ApiUsageOverview:
      type: object
      properties:
        totalRequests:
          type: integer
          example: 100
        successRate:
          type: number
          example: 92.5
        avgResponseTime:
          type: number
          example: 150
    ApiUsageDaily:
      type: object
      properties:
        date:
          type: string
          format: date
          example: 2026-03-01
        requests:
          type: integer
          example: 10
    Plan:
      type: object
      properties:
        name:
          type: string
          example: basic
        priceUsd:
          type: number
          example: 99
        monthlyApiCalls:
          type: number
          example: 100000
        maxApiKeys:
          type: number
          example: 3
        marketOverview:
          type: boolean
        realtimeData:
          type: boolean
        supportLevel:
          type: string
          example: email      
security:
  - BearerAuth: []

tags:
  - name: Auth
    description: User authentication and account management
  - name: Markets
    description: Market info and coin prices
  - name: Markets
    description: Market data for different intervals
  - name: Payments
    description: Payment, subscription, and plan management
  - name: API Keys
    description: API key management for users
  - name: Users
    description: User profile and account management


paths:
  /auth/signup:
    post:
      tags: [Auth]
      summary: Sign up a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password, plan, agreeToTerms]
              properties:
                email:
                  type: string
                  example: john@example.com
                name:
                  type: string
                  example: John Doe
                password:
                  type: string
                  example: strongPassword123
                newsletter:
                  type: boolean
                  example: true
                agreeToTerms:
                  type: boolean
                  example: true
      responses:
        201:
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User signed up successfully
                  user:
                    $ref: '#/components/schemas/User'

  /auth/login:
    post:
      tags: [Auth]
      summary: Sign in user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: strongPassword123
      responses:
        200:
          description: User signed in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: jwt.token.here

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: john@example.com
      responses:
        200:
          description: Password reset token sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password reset link sent
                  token:
                    type: string
                    example: 32-char-reset-token

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                  example: 32-char-reset-token
                newPassword:
                  type: string
                  example: NewStrongPassword123
      responses:
        200:
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password reset successful

  /api/v1/markets:
    get:
      tags: [Markets]
      summary: Get candles for a symbol
      description: Returns candle (OHLCV) data for a given symbol and interval
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
            example: BTC
        - name: interval
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w]
            example: 1m
        - name: from
          in: query
          required: false
          description: Unix timestamp (seconds) for start
          schema:
            type: integer
            example: 1773241043
        - name: to
          in: query
          required: false
          description: Unix timestamp (seconds) for end
          schema:
            type: integer
            example: 1773327443
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 100
      responses:
        200:
          description: Candle data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  s:
                    type: string
                    example: ok
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Market'

  /api/v1/markets/{symbol}/price:
    get:
      tags: [Markets]
      summary: Get latest price for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            example: BTC
      responses:
        200:
          description: Latest price retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketPrice'

  /api/v1/markets/{symbol}/stats:
    get:
      tags: [Markets]
      summary: Get 24h stats for a symbol
      description: Returns 24h open, close, high, low, and volume
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            example: BTC
        - name: from
          in: query
          required: false
          description: Unix timestamp (seconds) for start
          schema:
            type: integer
            example: 1773241043
        - name: to
          in: query
          required: false
          description: Unix timestamp (seconds) for end
          schema:
            type: integer
            example: 1773327443
      responses:
        200:
          description: 24h stats retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketStats'
  /payments/verify:
    post:
      tags: [Payments]
      summary: Confirm user payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionId, amountCurrency, currency, plan,walletAddress,amountUsdt]
              properties:
                transactionId:
                  type: string
                  example: 0x123abc...
                amountCurrency:
                  type: number
                  example: 100 
                amountUsdt:
                  type: number
                  example: 100
                currency:
                  type: string
                  example: USDT
                plan:
                  type: string
                  enum: [basic, growth, pro]
                walletAddress:
                  type: string

      responses:
        200:
          description: Payment confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Payment confirmed and plan updated
                  payment:
                    $ref: '#/components/schemas/Payment'
  /payments/upgrade:
    post:
      tags: [Payments]
      summary: upgrade user plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionId, currency, plan,walletAddress,amountUsdt]
              properties:
                transactionId:
                  type: string
                  example: 0x123abc...
                amountCurrency:
                  type: number
                  example: 100 
                amountUsdt:
                  type: number
                  example: 100
                currency:
                  type: string
                  example: USDT
                plan:
                  type: string
                  enum: [basic, growth, pro]
                walletAddress:
                  type: string

      responses:
        200:
          description: Payment confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Payment confirmed and plan updated
                  payment:
                    $ref: '#/components/schemas/Payment'

  /payments/history:
    get:
      tags: [Payments]
      summary: Get user billing history
      responses:
        200:
          description: Billing history retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
  
  /payments/payment-plan:
    get:
      tags: [Payments]
      summary: Get payemnt plan 
      responses:
        200:
          description: plan retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
  /payments/current:
    get:
      tags: [Payments]
      summary: Get user current plan
      responses:
        200:
          description: Billing history retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
  

  /api-keys:
    post:
      tags: [API Keys]
      summary: Generate new API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: MyKey1
      responses:
        201:
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
    get:
      tags: [API Keys]
      summary: Get all API keys for current user
      responses:
        200:
          description: API keys retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKey'

  /api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Delete an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: API key deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: API key deleted successfully

  # ----------------- User Profile APIs -----------------
  /users:
    patch:
      tags: [Users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  example: john@example.com
                companyName:
                  type: string
                  example: ACME Corp
                oldPassword:
                  type: string
                  example: oldPassword123
                newPassword:
                  type: string
                  example: NewPassword123
      responses:
        200:
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    delete:
      tags: [Users]
      summary: Delete user account
      responses:
        200:
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User deleted successfully





   # API Usage endpoints
  /api/v1/usage/overview:
    get:
      tags: [Usage]
      summary: Get API usage overview for authenticated user
      security:
        - BearerAuth: []
      responses:
        200:
          description: API usage overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ApiUsageOverview'

  /api/v1/usage/daily:
    get:
      tags: [Usage]
      summary: Get daily API usage counts (last 30 days) for authenticated user
      security:
        - BearerAuth: []
      responses:
        200:
          description: Daily API usage
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiUsageDaily'
  /api/v1/usage/global-overview:
    get:
      tags: [Usage]
      summary: Get global API usage
      security:
        - BearerAuth: []
      responses:
        200:
          description: Global API usage
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiUsageDaily'                    